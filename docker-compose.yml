version: '3.8'

# ════════════════════════════════════════════════════════════════════
# HRMS COMPLETE MICROSERVICES ARCHITECTURE
# ════════════════════════════════════════════════════════════════════
#
# This docker-compose orchestrates the complete HRMS system:
# - Infrastructure (PostgreSQL, RabbitMQ, Redis)
# - Microservices (Auth, Employee)
# - API Gateway (Single entry point)
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f
#   docker-compose down
#
# Architecture:
#   Client → API Gateway (3000) → Microservices (8081, 8083)
#   Services communicate via RabbitMQ (event-driven)
#   All services use PostgreSQL + Redis + RabbitMQ
#
# ════════════════════════════════════════════════════════════════════

services:

  # ══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES
  # ══════════════════════════════════════════════════════════════

  # PostgreSQL: Multiple databases for each service
  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms_pass
      POSTGRES_DB: hrms_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network
    restart: unless-stopped

  # RabbitMQ: Event bus for async inter-service communication
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: hrms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: hrms
      RABBITMQ_DEFAULT_PASS: hrms_pass
    ports:
      - "5672:5672"        # AMQP port (internal)
      - "15672:15672"      # Management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network
    restart: unless-stopped

  # Redis: Cache and session storage
  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ══════════════════════════════════════════════════════════════

  # Auth Service: User authentication and JWT token issuance
  # - Registers users
  # - Issues JWT tokens
  # - Emits user.created, user.deleted events
  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: hrms-auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081

      # Database: hrms_auth
      SPRING_DATASOURCE_URL: jdbc:postgresql://hrms-postgres:5432/hrms_auth
      SPRING_DATASOURCE_USERNAME: hrms
      SPRING_DATASOURCE_PASSWORD: hrms_pass

      # RabbitMQ: Event publishing
      SPRING_RABBITMQ_HOST: hrms-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hrms
      SPRING_RABBITMQ_PASSWORD: hrms_pass

      # Redis: Session cache
      SPRING_DATA_REDIS_HOST: hrms-redis
      SPRING_DATA_REDIS_PORT: 6379

      # JWT Security
      JWT_SECRET: IEsr9J344VSPBtwUCOH467cAtqm7b0YAqAYBAa8AYTg=
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000

    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Employee Service: Employee management and domain
  # - Manages employee records
  # - Handles departments, designations, skills, insurance
  # - Listens to user.created/user.deleted events
  # - Validates identity via gateway headers
  employee-service:
    build:
      context: ./apps/employee-service
      dockerfile: Dockerfile
    container_name: hrms-employee-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083

      # Database: hrms_employee
      SPRING_DATASOURCE_URL: jdbc:postgresql://hrms-postgres:5432/hrms_employee
      SPRING_DATASOURCE_USERNAME: hrms
      SPRING_DATASOURCE_PASSWORD: hrms_pass

      # RabbitMQ: Event listening
      SPRING_RABBITMQ_HOST: hrms-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: hrms
      SPRING_RABBITMQ_PASSWORD: hrms_pass

      # Redis: Cache
      SPRING_DATA_REDIS_HOST: hrms-redis
      SPRING_DATA_REDIS_PORT: 6379

      # Gateway Trust
      GATEWAY_ENABLED: "true"

    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ══════════════════════════════════════════════════════════════
  # API GATEWAY (Single Entry Point)
  # ══════════════════════════════════════════════════════════════

  # Express API Gateway: Route orchestration and JWT verification
  # - Single entry point at port 3000
  # - Verifies JWT tokens
  # - Routes to microservices
  # - Injects user identity via headers
  # - Rate limiting and CORS handling
  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      NODE_ENV: production
      PORT: 3000

      # Security: JWT verification (must match auth-service)
      JWT_SECRET: IEsr9J344VSPBtwUCOH467cAtqm7b0YAqAYBAa8AYTg=

      # CORS: Frontend access
      FRONTEND_URL: http://hrms-frontend:3000

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 15000
      RATE_LIMIT_MAX_REQUESTS: 100

    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      employee-service:
        condition: service_healthy
    networks:
      - hrms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hrms-network:
    name: hrms-network
    driver: bridge

volumes:
  postgres_data:
    driver: local
