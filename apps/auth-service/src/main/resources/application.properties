spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

# ===============================
# DATABASE (service-specific URL only; driver/user/pass come from hrms-common-defaults)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://hrms-postgres:5432/hrms_auth}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# ===============================
# REDIS (auth-service is the only service that uses Redis)
# ===============================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:hrms-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# ACTUATOR (extend common defaults with Redis/rabbit health indicators)
# ===============================
management.health.rabbit.enabled=true
management.health.redis.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.hrms.auth=DEBUG

# ===============================
# AUTO-CONFIG EXCLUSIONS
# Keep Redis active (auth uses it); exclude only unused ones
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration
