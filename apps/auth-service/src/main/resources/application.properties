spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://hrms-postgres:5432/hrms_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hrms}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hrms_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:hrms-rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:hrms}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:hrms_pass}

# ===============================
# REDIS
# ===============================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:hrms-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.jedis.pool.max-wait=-1ms

# ===============================
# JWT (FIXED VARIABLE NAMES)
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.rabbit.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true
management.endpoint.health.probes.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.hrms.auth=DEBUG

# FIXED (BUG #6): Suppress "User context cleared" spam from actuator health checks
# TrustHeadersFilter.doFilter() logs at DEBUG level, but entire package was DEBUG
# causing INFO-level output. Now explicitly suppress this filter's logs to WARN.
logging.level.com.hrms.auth.infrastructure.security.TrustHeadersFilter=WARN

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration