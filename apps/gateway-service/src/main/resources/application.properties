spring.application.name=gateway-service
server.port=${SERVER_PORT:8084}
server.servlet.context-path=/

# ===============================
# SPRING CLOUD GATEWAY
# ===============================
spring.cloud.gateway.enable-simple-url-handler-mapping=true
spring.cloud.compatibility-verifier.enabled=false

# FIXED (BUG #1): Add missing route definitions
# Without these routes, Spring Cloud Gateway cannot forward requests to microservices
# Each route defines: id, uri (target service), predicates (path matching)
# Container names must exactly match Docker container_name in docker-compose.yml

# FIXED (PATH MISMATCH): Updated routes to remove /v1 prefix
# Controllers are no longer versioned. Gateway routes now use unversioned paths.

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://hrms-auth-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=employee-service
spring.cloud.gateway.routes[1].uri=http://hrms-employee-service:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/employees/**

spring.cloud.gateway.routes[2].id=employee-service-insurances
spring.cloud.gateway.routes[2].uri=http://hrms-employee-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/employees/insurances/**

spring.cloud.gateway.routes[3].id=employee-service-dept
spring.cloud.gateway.routes[3].uri=http://hrms-employee-service:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/departments/**

spring.cloud.gateway.routes[4].id=employee-service-designations
spring.cloud.gateway.routes[4].uri=http://hrms-employee-service:8083
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/designations/**

spring.cloud.gateway.routes[5].id=employee-service-org-chart
spring.cloud.gateway.routes[5].uri=http://hrms-employee-service:8083
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/organization-chart/**

spring.cloud.gateway.routes[6].id=attendance-service
spring.cloud.gateway.routes[6].uri=http://hrms-attendance-service:8085
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/attendance/**
spring.cloud.gateway.routes[6].predicates[1]=Path=/api/device-attendance/**
spring.cloud.gateway.routes[6].predicates[2]=Path=/api/daily-attendance/**

spring.cloud.gateway.routes[7].id=performance-service
spring.cloud.gateway.routes[7].uri=http://hrms-performance-service:8086
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/performance/**

# ===============================
# JWT SECURITY
# ===============================

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:hrms-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2000

# ===============================
# RATE LIMITING
# ===============================
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:100}

# ===============================
# FRONTEND CORS
# ===============================
frontend.url=${FRONTEND_URL:http://localhost:3000}

# ===============================
# LOGGING
# ===============================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.hrms.gateway=INFO
logging.file.name=logs/gateway.log
logging.file.max-size=10MB
logging.file.max-history=10

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# =========================================================
# SPRING CLOUD GATEWAY GLOBAL CORS
# Moved to CorsConfig.java (CorsWebFilter) for better 401 handling
# =========================================================
