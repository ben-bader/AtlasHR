spring.application.name=performance-service
server.port=${SERVER_PORT:8086}

# ===============================
# DATABASE (service-specific URL; driver/user/pass from hrms-common-defaults)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://hrms-postgres:5432/hrms_performance}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# Override common default: show SQL in development (controlled via env var)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.hrms.performance=DEBUG

# ===============================
# AUTO-CONFIG EXCLUSIONS
# ===============================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
