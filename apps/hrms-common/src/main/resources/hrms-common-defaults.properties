# ==============================================================
# HRMS Common Defaults
# Loaded by HrmsDefaultsAutoConfig via @PropertySource.
# @PropertySource is processed AFTER application.properties, so
# any property defined in a service's own application.properties
# automatically takes precedence over these values.
# ==============================================================

# ---------------------------------------------------------------
# DATASOURCE
# ---------------------------------------------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hrms}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hrms_pass}

# ---------------------------------------------------------------
# JPA / HIBERNATE
# Intentionally omits ddl-auto — each service must set it explicitly
# to prevent accidental schema mutations.
# ---------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------
# RABBITMQ
# These defaults apply only when spring-boot-starter-amqp is on
# the classpath (HrmsRabbitAutoConfig is @ConditionalOnClass).
# ---------------------------------------------------------------
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:hrms-rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:hrms}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:hrms_pass}

# ---------------------------------------------------------------
# ACTUATOR
# ---------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
