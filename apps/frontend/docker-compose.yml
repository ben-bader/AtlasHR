services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8084/api
        NEXT_PUBLIC_APP_NAME: HRMS

    container_name: hrms-frontend

    environment:
      NODE_ENV: production
      PORT: 3000

      # IMPORTANT: runtime only (server-side usage)
      API_GATEWAY_INTERNAL_URL: http://hrms-gateway-service:8084

    ports:
      - "3000:3000"


    networks:
      - hrms-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


networks:
  hrms-network:
    external: true