# In-memory DB for unit tests — default profile expects Docker hostnames (hrms-postgres)
spring.datasource.url=jdbc:h2:mem:hrms_employee;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database=H2
# Must override spring.jpa.database-platform from application.properties (PostgreSQL) when using H2 in tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Override Docker hostnames from application.properties so beans resolve locally
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.listener.simple.auto-startup=false
management.health.rabbit.enabled=false
