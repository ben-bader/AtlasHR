spring.application.name=employee-service
server.port=${SERVER_PORT:8083}
server.servlet.context-path=/

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://hrms-postgres:5432/hrms_employee}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hrms}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hrms_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.initialization-fail-timeout=60000

# ===============================
# JPA CONFIGURATION
# ===============================
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ===============================
# DATABASE INITIALIZATION
# ===============================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ===============================
# RABBITMQ CONFIGURATION
# ===============================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:hrms-rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:hrms}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:hrms_pass}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=20000

# ===============================
# ACTUATOR & HEALTH CHECKS
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.exposure.exclude=shutdown
management.endpoint.health.show-details=always
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.db.enabled=true
management.health.rabbit.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.root=WARN
logging.level.com.hrms.employee=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# SERVLET
# ===============================
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true

# ===============================
# COMPRESSION
# ===============================
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ===============================
# ERROR HANDLING
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ===============================
# EXCLUDE UNUSED AUTO-CONFIGURATIONS
# ===============================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
