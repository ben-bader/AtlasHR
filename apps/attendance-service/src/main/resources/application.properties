spring.application.name=attendance-service
server.port=${SERVER_PORT:8085}

# ===============================
# DATABASE (service-specific URL; driver/user/pass from hrms-common-defaults)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://hrms-postgres:5432/hrms_attendance}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# ===============================
# FEIGN CLIENT (employee-service)
# ===============================
employee.service.url=${EMPLOYEE_SERVICE_URL:http://hrms-employee-service:8083}
feign.client.config.employee-service.connectTimeout=5000
feign.client.config.employee-service.readTimeout=5000
spring.cloud.openfeign.circuitbreaker.enabled=true

# ===============================
# ACTUATOR (extend common defaults with rabbit/prometheus)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.rabbit.enabled=true
management.metrics.export.prometheus.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.hrms.attendance_service=DEBUG
logging.level.com.hrms.attendance_service.infrastructure.client=DEBUG
logging.level.feign=INFO
logging.level.org.springframework.cloud.openfeign=INFO

# ===============================
# JACKSON
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# AUTO-CONFIG EXCLUSIONS
# ===============================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
