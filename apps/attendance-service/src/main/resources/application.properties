# ===============================
# APPLICATION
# ===============================
spring.application.name=attendance-service
server.port=${SERVER_PORT:8085}

# ===============================
# EMPLOYEE SERVICE (FEIGN CLIENT)
# ===============================
employee.service.url=${EMPLOYEE_SERVICE_URL:http://hrms-employee-service:8083}

# Feign timeouts (service-specific)
feign.client.config.employee-service.connectTimeout=5000
feign.client.config.employee-service.readTimeout=5000

# Enable circuit breaker (Spring Cloud OpenFeign)
spring.cloud.openfeign.circuitbreaker.enabled=true

# ===============================
# DATABASE (POSTGRESQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://hrms-postgres:5432/hrms_attendance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hrms}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hrms_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:hrms-rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:hrms}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:hrms_pass}

# ===============================
# SECURITY (Gateway-based auth)
# ===============================
spring.security.enabled=false

# ===============================
# ACTUATOR (MONITORING)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.rabbit.enabled=true
management.endpoint.health.probes.enabled=true
management.metrics.export.prometheus.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.hrms.attendance_service=DEBUG
logging.level.com.hrms.attendance_service.infrastructure.client=DEBUG
logging.level.feign=INFO
logging.level.org.springframework.cloud.openfeign=INFO

# ===============================
# JACKSON (JSON CLEAN OUTPUT)
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# OPTIONAL CONFIG SERVER (future)
# ===============================
# spring.config.import=optional:configserver:

# ===============================
# CLEAN AUTO-CONFIG EXCLUSIONS
# ===============================
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration,\
org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration