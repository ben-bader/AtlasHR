apiVersion: v1
kind: Secret
metadata:
  name: {{ include "employee-service.fullname" . }}-secrets
  namespace: hrms
  labels:
    {{- include "employee-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-username: {{ .Values.secrets.dbUsername | quote }}
  db-password: {{ .Values.secrets.dbPassword | quote }}
  rabbitmq-username: {{ .Values.secrets.rabbitmqUsername | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmqPassword | quote }}
