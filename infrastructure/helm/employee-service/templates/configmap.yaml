apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "employee-service.fullname" . }}-config
  namespace: hrms
  labels:
    {{- include "employee-service.labels" . | nindent 4 }}
data:
  database-url: {{ .Values.config.databaseUrl | quote }}
  rabbitmq-host: {{ .Values.config.rabbitmqHost | quote }}
  rabbitmq-port: {{ .Values.config.rabbitmqPort | quote }}
