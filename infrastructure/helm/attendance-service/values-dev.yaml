replicaCount: 1

image:
  repository: hrms/attendance-service
  pullPolicy: Always
  tag: "latest"

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2

config:
  databaseUrl: "jdbc:postgresql://postgres:5432/hrms_attendance_db"
  rabbitmqHost: "rabbitmq"
  rabbitmqPort: "5672"