apiVersion: v1
kind: Service
metadata:
  name: {{ include "attendance-service.fullname" . }}
  namespace: hrms
  labels:
    {{- include "attendance-service.labels" . | nindent 4 }}

  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

spec:
  type: {{ .Values.service.type }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http

  selector:
    {{- include "attendance-service.selectorLabels" . | nindent 4 }}
    