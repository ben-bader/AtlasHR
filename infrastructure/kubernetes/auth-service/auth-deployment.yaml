apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hrms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: hrms/auth-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/hrms_auth
            - name: SPRING_DATASOURCE_USERNAME
              value: hrms
            - name: SPRING_DATASOURCE_PASSWORD
              value: hrms
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq