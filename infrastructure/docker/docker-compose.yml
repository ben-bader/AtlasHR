services:

  # ── RabbitMQ (shared message broker) ──────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: hrms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: hrms
      RABBITMQ_DEFAULT_PASS: hrms_pass
    ports:
      - "5672:5672"
      - "15672:15672"    # management UI → localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network
    restart: unless-stopped

  # ── Postgres (one instance, multiple databases) ────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms_pass
      POSTGRES_DB: hrms_auth   # default db, others created by init script
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql  # creates all DBs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network
    restart: unless-stopped

  # ── Redis (shared cache / session store) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network
    restart: unless-stopped

networks:
  hrms-network:
    name: hrms-network          # named so other compose files can join it
    driver: bridge

volumes:
  postgres_data: